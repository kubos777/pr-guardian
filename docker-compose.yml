version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pr_guardian
      POSTGRES_PASSWORD: pr_guardian_dev
      POSTGRES_DB: pr_guardian
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pr_guardian"]
      interval: 5s
      timeout: 3s
      retries: 3

  webhook:
    build: .
    command: uvicorn github_integration.webhook_handler:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://pr_guardian:pr_guardian_dev@postgres:5432/pr_guardian
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgresql://pr_guardian:pr_guardian_dev@postgres:5432/pr_guardian
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

  mcp:
    build: .
    command: python github-integration/server.py
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://pr_guardian:pr_guardian_dev@postgres:5432/pr_guardian
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  redis_data:
  postgres_data:
